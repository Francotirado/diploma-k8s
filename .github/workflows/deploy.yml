name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:
    types: [ image-pushed ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: azure/setup-kubectl@v3
      with: { version: 'v1.29.0' }
    - uses: azure/setup-helm@v3
      with: { version: 'v3.14.0' }

    - name: Setup kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Add Helm Repos
      run: |
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update

    - name: Deploy Ingress
      run: helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx -n ingress-nginx --create-namespace -f helm/ingress-nginx/values.yaml

    - name: Deploy Monitoring
      run: helm upgrade --install monitoring prometheus-community/kube-prometheus-stack -n monitoring --create-namespace -f helm/monitoring/values.yaml

    - name: Get latest tag
      id: tag
      run: |
        # Если триггер от repository_dispatch — берём тег из пейлоада
        if [[ "${{ github.event_name }}" == "repository_dispatch" ]] && \
           [[ -n "${{ github.event.client_payload.tag }}" ]]; then
          TAG="${{ github.event.client_payload.tag }}"
          echo "Using tag from dispatch: $TAG"
        else
          # Иначе берём последний тег из реестра
          TAG="latest"
          LATEST_TAG=$(curl -s \
            https://cr.yandex/v2/crppthgv7553krfpenjf/diploma-app/tags/list \
            | jq -r '.tags[-1] // empty')
          if [ -n "$LATEST_TAG" ] && [ "$LATEST_TAG" != "null" ]; then
            TAG=$LATEST_TAG
          fi
          echo "Using tag from registry: $TAG"
        fi
        echo "TAG=$TAG" >> $GITHUB_ENV
        echo "TAG=$TAG" >> $GITHUB_OUTPUT

    - name: Deploy MySQL
      run: |
        kubectl apply -f manifests/mysql/
        kubectl wait --for=condition=ready pod -l app=mysql --timeout=120s

    - name: Deploy application
      run: helm upgrade --install diploma-app ./helm/diploma-app --set image.tag=${{ env.TAG }} --wait --timeout 300s

    - name: Verify
      run: kubectl wait --for=condition=ready pod -l app=diploma-app --timeout=120s
