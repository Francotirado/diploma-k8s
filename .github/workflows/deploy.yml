name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    paths: [ 'helm/**', 'manifests/**' ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: azure/setup-kubectl@v3
      with: { version: 'v1.29.0' }
    - uses: azure/setup-helm@v3
      with: { version: 'v3.14.0' }

    - name: Setup kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Add Helm Repos
      run: |
        helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update

    - name: Deploy Ingress
      run: helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx \
        -n ingress-nginx --create-namespace -f helm/ingress-nginx/values.yaml

    - name: Deploy Monitoring
      run: helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
        -n monitoring --create-namespace -f helm/monitoring/values.yaml

    - name: Deploy App
      run: kubectl apply -f manifests/app/

    - name: Verify
      run: kubectl wait --for=condition=ready pod -l app=diploma-app --timeout=120s
