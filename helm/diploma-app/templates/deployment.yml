apiVersion: apps/v1
kind: Deployment
metadata:
  name: diploma-app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: diploma-app
  template:
    metadata:
      labels:
        app: diploma-app
    spec:
      initContainers:
      - name: wait-for-mysql
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z mysql 3306; do echo "Waiting for MySQL"; sleep 2; done; echo "MySQL is ready!"']
      containers:
      - name: app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports: [{ containerPort: 5000 }]
        env:
        - { name: DB_HOST, value: "mysql" }
        - { name: DB_USER, value: "app" }
        - { name: DB_PASSWORD, value: "very_strong" }
        - { name: DB_NAME, value: "example" }
        livenessProbe:
          httpGet: { path: /, port: 5000 }
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /, port: 5000 }
          initialDelaySeconds: 10
          periodSeconds: 5
